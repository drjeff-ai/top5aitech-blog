baseURL = "https://topfiveaitech.com/"
languageCode = "en-us"
title = "Top Five AI Tech"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "AI insights, tools, and automation strategies for modern businesses."
  author = "Top Five AI Tech"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  images = ["/images/default-social.png"]

  [params.homeInfoParams]
    Title = "Practical AI for modern business"
    Content = "No jargon, no hype — just actionable guides to help you automate the boring stuff and focus on growth."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/drjeff-ai"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/company/YOUR_COMPANY"
  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/YOUR_HANDLE"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true
    responsiveImages = true

  [params.assets]
    favicon = "/favicon.ico"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  [params.label]
    text = "topfiveaitech"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "archive"
  name = "Archive"
  url = "/archive/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
